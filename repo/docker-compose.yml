# RideCircle Carpool Marketplace -- Docker Compose
# Offline-first deployment: all services run locally, no external dependencies.
#
# Mount only schema.sql into initdb.d (not the whole database/ folder) so MySQL does
# not skip subdirectories like seeds/ and so first boot applies schema reliably.
# Fixture data is loaded by repo/run_tests.sh before API tests (CI-safe).

services:
  mysql:
    image: mysql:8.0
    container_name: ridecircle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-ridecircle}
      MYSQL_USER: ${DB_USERNAME:-ridecircle}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      # Wait until initdb scripts have created application tables (not just mysqld listening).
      test:
        [
          "CMD-SHELL",
          "mysql -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" \"$$MYSQL_DATABASE\" -e 'SELECT 1 FROM organizations LIMIT 1' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 90s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ridecircle-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ridecircle}
      - DB_USERNAME=${DB_USERNAME:-ridecircle}
      - DB_PASSWORD=${DB_PASSWORD:-change_me_in_production}
      - APP_DEBUG=false
      - APP_ENV=testing
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    volumes:
      - ./backend:/var/www/html
      - media_storage:${MEDIA_STORAGE_PATH:-/var/ridecircle/media}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ridecircle-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

volumes:
  mysql_data:
    driver: local
  media_storage:
    driver: local
